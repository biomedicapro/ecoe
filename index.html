<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECOE · Medicina Interna</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Georgia&family=Source+Serif+4:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #F4F1EC;
  --surface: #FAFAF8;
  --border: rgba(0,0,0,0.13);
  --border-med: rgba(0,0,0,0.22);
  --text: #0D0D0B;
  --muted: #555550;
  --faint: #999990;
  --accent: #0D0D0B;
  --accent-light: #E8E5DF;
  --correct: #1A1A18;
  --correct-bg: #E4E1DB;
  --wrong: #0D0D0B;
  --wrong-bg: #F0EDE7;
  --warn-bg: #EDEAD4;
  --warn: #3A3A35;
  --pill-neuro: #2A2A28;
  --pill-neuro-bg: #E2DFD8;
  --pill-neumol: #2A2A28;
  --pill-neumol-bg: #DEDAD2;
  --pill-cardio: #0D0D0B;
  --pill-cardio-bg: #D8D4CC;
  --pill-derm: #2A2A28;
  --pill-derm-bg: #E6E2D8;
  --pill-meta: #2A2A28;
  --pill-meta-bg: #DFDBD2;
  --radius: 4px;
  --radius-sm: 2px;
  --shadow: none;
}

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.65;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .header-brand span { color: var(--text); font-weight: 600; }
  .header-score {
    font-size: 13px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .header-score strong { color: var(--text); }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 56px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }
  .sidebar-section {
    padding: 0 1rem;
    margin-bottom: 0.25rem;
  }
  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--faint);
    padding: 0 0.5rem;
    margin-bottom: 0.5rem;
  }
  .nav-case {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.12s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-size: 13px;
    color: var(--muted);
  }
  .nav-case:hover { background: var(--bg); }
  .nav-case.active { background: var(--accent-light); color: var(--accent); }
  .nav-case.active .nav-num { background: var(--accent); color: #fff; }
  .nav-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--border);
    font-size: 10px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .nav-case-name { flex: 1; line-height: 1.3; }
  .nav-check {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    font-size: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-check.done { background: var(--correct); color: #fff; }
  .nav-check.partial { background: var(--warn-bg); border: 1px solid var(--warn); }

  .sidebar-divider { height: 1px; background: var(--border); margin: 1rem 1rem; }

  /* ── MAIN ── */
  .main { padding: 2rem; max-width: 760px; }

  /* ── SPECIALTY PILL ── */
  .specialty-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 0.75rem;
  }

  /* ── CASE HEADER ── */
  .case-header { margin-bottom: 1.5rem; }
  .case-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 0.25rem;
  }
  .case-meta { font-size: 13px; color: var(--muted); }

  /* ── CLINICAL VIGNETTE ── */
  .vignette {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.75rem;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    box-shadow: var(--shadow);
    position: relative;
  }
  .vignette-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 0.75rem;
  }
  .vignette-highlight {
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    padding: 0.75rem 1rem;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin-top: 1rem;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    line-height: 1.6;
  }

  /* ── PROGRESS ── */
  .case-progress {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .progress-label { font-size: 12px; color: var(--muted); white-space: nowrap; font-variant-numeric: tabular-nums; }

  /* ── QUESTION ── */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
    transition: border-color 0.15s;
  }
  .question-card.answered { border-color: var(--border-med); }
  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .q-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .q-text {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.55;
    color: var(--text);
  }
  .options { display: flex; flex-direction: column; gap: 6px; padding-left: 34px; }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    text-align: left;
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--text);
    width: 100%;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); }
  .option-btn.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong); }
  .option-btn.reveal-correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); }
  .opt-letter {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--border);
    font-size: 10px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--muted);
  }
  .option-btn.correct .opt-letter { background: var(--correct); color: #fff; }
  .option-btn.wrong .opt-letter { background: var(--wrong); color: #fff; }
  .option-btn.reveal-correct .opt-letter { background: var(--correct); color: #fff; }

  /* ── FEEDBACK ── */
  .feedback {
    margin-top: 0.75rem;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    line-height: 1.6;
    display: none;
    margin-left: 34px;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: var(--correct-bg); color: var(--correct); border-left: 3px solid var(--correct); }
  .feedback.wrong { background: var(--wrong-bg); color: var(--wrong); border-left: 3px solid var(--wrong); }
  .feedback strong { font-weight: 600; }

  /* ── RESULTS CARD ── */
  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    text-align: center;
    box-shadow: var(--shadow);
    margin-bottom: 1.5rem;
  }
  .results-score-big {
    font-size: 56px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.25rem;
    font-variant-numeric: tabular-nums;
  }
  .results-label { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-top: 1.25rem;
  }
  .result-stat {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 0.75rem 0.5rem;
    font-size: 12px;
    color: var(--muted);
  }
  .result-stat strong { display: block; font-size: 22px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }

  /* ── NAV BUTTONS ── */
  .case-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-med);
    background: var(--surface);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    font-family: inherit;
  }
  .btn:hover { background: var(--bg); border-color: var(--border-med); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #152E4A; border-color: #152E4A; }

  /* ── WELCOME ── */
  .welcome {
    padding: 3rem 2rem;
    max-width: 640px;
  }
  .welcome-title { font-size: 26px; font-weight: 600; line-height: 1.2; margin-bottom: 0.75rem; }
  .welcome-sub { color: var(--muted); font-size: 15px; margin-bottom: 2rem; line-height: 1.6; }
  .spec-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 2rem;
  }
  .spec-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    box-shadow: var(--shadow);
  }
  .spec-card-title { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
  .spec-card-info { font-size: 12px; color: var(--muted); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-med); border-radius: 2px; }

  @media (max-width: 640px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 1.25rem; }
    .results-grid { grid-template-columns: 1fr 1fr; }
    .spec-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  <div class="header-brand">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <rect x="1" y="1" width="16" height="16" rx="4" stroke="currentColor" stroke-width="1.5"/>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>

<script>
const CASES = [

    paraclinical: `ECG: Ritmo sinusal. Elevación ST 3 mm (cóncavo) en II, III, aVF. Infradesnivel ST 2 mm en DI y aVL. Elevación ST 2 mm en V4R. Troponinas ultrasensibles: 850 ng/L (VN < 20). Ecocardiograma urgente: hipocinesia pared inferior-posterior VI + dilatación y disfunción severa VD (TAPSE 9 mm).`,
    questions: [
      {

        correct: 1,

        explanation: "La tríada del infarto de VD: hipotensión + campos pulmonares limpios + PVY elevada, con bradicardia refleja, es patognomónica. El taponamiento puede simularla, pero el ECG y el ecocardiograma definen el diagnóstico."
      },
      {
        text: "¿Cuál es el manejo hemodinámico inicial más adecuado dado su perfil clínico?",

      },
      {
        text: "El paciente está en un centro sin hemodinámica y el traslado tarda 3 horas. La conducta correcta para reperfusión es:",
        options: ["Trombolisis inmediata con estreptoquinasa 1.5 millones UI IV y traslado posterior","Esperar traslado sin reperfusión porque la trombolisis está contraindicada en infarto de VD","Iniciar heparina no fraccionada y traslado urgente sin trombolisis","Trombolisis con alteplasa y contraindicación de traslado por 24 horas","Doble antiagregación como único manejo mientras se coordina ICP primaria"],

      {

      },

        explanation: "FA crónica sin anticoagulación + ACV con afasia global + hemiplejia densa = ACV cardioembólico. Los NACO (apixabán, rivaroxabán, dabigatrán, edoxabán) son superiores a la warfarina en FA no valvular para prevención secundaria de ACV."

  {
    id: 9,

        correct: 2,
        explanation: "El herpes zóster se caracteriza por: 1) pródromo doloroso antes de las lesiones, 2) distribución dermatomérica estrictamente unilateral, 3) no cruza la línea media. Las lesiones satélite fuera del dermatoma en un inmunocomprometido indican zóster diseminado."
      },
      {
        text: "Las lesiones satélite fuera del dermatoma en esta paciente inmunocomprometida indican:",
        options: ["Sobreinfección bacteriana con diseminación linfática regional","Zóster diseminado, definido por > 20 vesículas fuera del dermatoma primario o compromiso visceral","Fenómeno de Koebner en cicatrices previas de la pared torácica","Reactivación concomitante de VHS-1 por la inmunosupresión del ibrutinib","Lesiones satélite sin significado clínico adicional en inmunocomprometidos"],
        correct: 1,
        explanation: "El zóster diseminado se define por la aparición de > 20 vesículas fuera del dermatoma primario o compromiso de órganos internos. Es más frecuente en inmunocomprometidos (LLC, VIH, corticoides crónicos). Cambia el manejo: requiere hospitalización y aciclovir IV."
      },
      {
        text: "¿Cuál es el manejo correcto para esta paciente inmunocomprometida con zóster diseminado?",
        options: ["Aciclovir 800 mg oral 5 veces al día por 7 días y manejo ambulatorio","Valaciclovir 1 g oral 3 veces al día por 7 días como equivalente oral de alta absorción","Aciclovir IV 10-15 mg/kg cada 8 horas en hospitalización","Foscarnet IV como alternativa al aciclovir en todos los inmunocomprometidos","Observación; el zóster diseminado en inmunocomprometidos tiene resolución espontánea"],
        correct: 2,
        explanation: "El zóster diseminado en inmunocomprometidos requiere hospitalización y aciclovir IV (10-15 mg/kg c/8h, ajustado a función renal). La vía oral tiene biodisponibilidad insuficiente en este contexto. El foscarnet se reserva para aciclovir-resistencia."
      },
      {
        text: "¿Cuál es la complicación más frecuente y temida a largo plazo del herpes zóster?",
        options: ["Sobreinfección bacteriana de las lesiones por Staphylococcus aureus","Neuralgia posherpética: dolor neuropático persistente > 3 meses tras la resolución","Cicatrices queloides en el área del dermatoma afectado","Meningitis viral por extensión directa al sistema nervioso central","Recurrencia inmediata del zóster en el mismo dermatoma dentro de los 30 días"],
        correct: 1,
        explanation: "La neuralgia posherpética (NPH) es la complicación más frecuente: dolor quemante y alodinia persistentes > 3 meses. Afecta al 10-15% y hasta el 40% en mayores de 70 años. Se trata con gabapentina, pregabalina, antidepresivos tricíclicos y parches de lidocaína o capsaicina."
      },
      {
        text: "¿Cuál es la lesión elemental INICIAL del herpes zóster antes de la fase vesicular?",
        options: ["Mácula eritematosa que progresa a pápula eritematosa","Vesícula directamente desde piel sana sin lesión previa","Pústula inicial que evoluciona a vesícula al resolverse la infección","Nódulo subcutáneo doloroso sin cambio epidérmico inicial","Placa urticariforme pruriginosa antes de la vesiculación"],
        correct: 0,
        explanation: "La secuencia dermatológica del herpes zóster es: mácula eritematosa → pápula → vesícula sobre base eritematosa → pústula → costra. La lesión elemental 'inicial' es la mácula/pápula eritematosa antes de la vesiculación clásica."
      }
    ]
  }
];

const SPECIALTY_COLORS = {
  cardio: { bg: 'var(--pill-cardio-bg)', color: 'var(--pill-cardio)' },
  meta:   { bg: 'var(--pill-meta-bg)',  color: 'var(--pill-meta)' },
  neumo:  { bg: 'var(--pill-neumol-bg)', color: 'var(--pill-neumol)' },
  neuro:  { bg: 'var(--pill-neuro-bg)', color: 'var(--pill-neuro)' },
  derm:   { bg: 'var(--pill-derm-bg)', color: 'var(--pill-derm)' }
};

let state = {
  current: -1,
  answers: CASES.map(c => Array(c.questions.length).fill(null))
};

function totalAnswered() {
  return state.answers.reduce((s, a) => s + a.filter(x => x !== null).length, 0);
}
function totalCorrect() {
  return state.answers.reduce((s, a, ci) =>
    s + a.filter((ans, qi) => ans === CASES[ci].questions[qi].correct).length, 0);
}
function totalQuestions() {
  return CASES.reduce((s, c) => s + c.questions.length, 0);
}
function caseAnswered(ci) {
  return state.answers[ci].filter(x => x !== null).length;
}
function caseTotal(ci) { return CASES[ci].questions.length; }

function updateHeader() {
  document.getElementById('total-answered').textContent = totalAnswered();
  document.getElementById('total-questions').textContent = totalQuestions();
  document.getElementById('total-correct').textContent = totalCorrect();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';

  const groups = [
    { label: 'Cardio · SCA & Falla', ids: [0,1,2] },
    { label: 'Metabólico', ids: [3,4,5] },
    { label: 'Neumología', ids: [6,7] },
    { label: 'Neurología', ids: [8] },
    { label: 'Dermatología', ids: [9] }
  ];

  html += `<div class="sidebar-section"><button class="nav-case ${state.current === -1 ? 'active' : ''}" onclick="showWelcome()">
    <div class="nav-num">✦</div>
    <div class="nav-case-name">Inicio</div>
  </button></div>`;

  groups.forEach(g => {
    html += `<div class="sidebar-divider"></div><div class="sidebar-section"><div class="sidebar-label">${g.label}</div>`;
    g.ids.forEach(id => {
      const done = caseAnswered(id);
      const total = caseTotal(id);
      const active = state.current === id;
      let checkHtml = '';
      if (done === total && total > 0) checkHtml = `<div class="nav-check done">✓</div>`;
      else if (done > 0) checkHtml = `<div class="nav-check partial"></div>`;
      else checkHtml = `<div class="nav-check"></div>`;

      html += `<button class="nav-case ${active ? 'active' : ''}" onclick="showCase(${id})">
        <div class="nav-num">${id+1}</div>
        <div class="nav-case-name">${CASES[id].title}</div>
        ${checkHtml}
      </button>`;
    });
    html += '</div>';
  });

  sb.innerHTML = html;
}

function showWelcome() {
  state.current = -1;
  renderSidebar();
  const sp = [
    { label: 'Falla cardiaca · SCA', info: '3 casos · 15 preguntas', key: 'cardio' },
    { label: 'Metabólico · DM · ERC', info: '3 casos · 13 preguntas', key: 'meta' },
    { label: 'Neumología', info: '2 casos · 8 preguntas', key: 'neumo' },
    { label: 'Neurología', info: '1 caso · 5 preguntas', key: 'neuro' },
    { label: 'Dermatología', info: '1 caso · 5 preguntas', key: 'derm' },
  ];
  const specCards = sp.map(s => {
    const c = SPECIALTY_COLORS[s.key];
    return `<div class="spec-card">
      <div class="spec-card-title" style="color: ${c.color}">${s.label}</div>
      <div class="spec-card-info">${s.info}</div>
    </div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="welcome">
      <div class="case-header">
        <div class="case-title">Banco de preguntas ECOE</div>
        <div class="case-meta">Medicina Interna · 10 casos clínicos · 46 preguntas</div>
      </div>
      <p class="welcome-sub">Casos clínicos de razonamiento aplicado con retroalimentación inmediata. Selecciona un caso en el panel izquierdo para comenzar.</p>
      <div class="spec-grid">${specCards}</div>
      <button class="btn btn-primary" onclick="showCase(0)">Comenzar con el caso 1 →</button>
    </div>`;
}

function showCase(id) {
  state.current = id;
  renderSidebar();
  const c = CASES[id];
  const col = SPECIALTY_COLORS[c.specialty];
  const answered = caseAnswered(id);
  const total = caseTotal(id);
  const pct = Math.round(answered / total * 100);

  let questionsHtml = c.questions.map((q, qi) => {
    const userAns = state.answers[id][qi];
    const answered = userAns !== null;
    return `<div class="question-card ${answered ? 'answered' : ''}" id="qcard-${id}-${qi}">
      <div class="q-header">
        <div class="q-num">${qi+1}</div>
        <div class="q-text">${q.text}</div>
      </div>
      <div class="options">
        ${q.options.map((opt, oi) => {
          let cls = '';
          if (answered) {
            if (oi === q.correct) cls = 'correct';
            else if (oi === userAns && userAns !== q.correct) cls = 'wrong';
          }
          return `<button class="option-btn ${cls}" ${answered ? 'disabled' : ''} onclick="answer(${id},${qi},${oi})">
            <div class="opt-letter">${String.fromCharCode(65+oi)}</div>
            <span>${opt}</span>
          </button>`;
        }).join('')}
      </div>
      <div class="feedback ${answered ? 'show' : ''} ${answered ? (userAns === q.correct ? 'correct' : 'wrong') : ''}" id="fb-${id}-${qi}">
        ${answered ? `<strong>${userAns === q.correct ? '✓ Correcto.' : `✗ Incorrecto. La respuesta correcta es ${String.fromCharCode(65+q.correct)}.`}</strong> ${q.explanation}` : ''}
      </div>
    </div>`;
  }).join('');

  const prevBtn = id > 0 ? `<button class="btn" onclick="showCase(${id-1})">← Caso ${id}</button>` : '<span></span>';
  const nextBtn = id < CASES.length - 1
    ? `<button class="btn btn-primary" onclick="showCase(${id+1})">Caso ${id+2} →</button>`
    : `<button class="btn btn-primary" onclick="showResults()">Ver resultados →</button>`;

  document.getElementById('main-content').innerHTML = `
    <div>
      <div class="case-header">
        <div class="specialty-pill" style="background: ${col.bg}; color: ${col.color}">${c.specialtyLabel}</div>
        <div class="case-title">${c.title}</div>
        <div class="case-meta">Caso ${id+1} de ${CASES.length} · ${total} preguntas</div>
      </div>

      <div class="vignette">
        <div class="vignette-label">Caso clínico</div>
        ${c.vignette.replace(/\n\n/g, '</p><p style="margin-top:0.75rem">').replace(/^/, '<p>').replace(/$/, '</p>')}
        ${c.paraclinical ? `<div class="vignette-highlight">Paraclínicos · ${c.paraclinical}</div>` : ''}
      </div>

      <div class="case-progress">
        <span class="progress-label">${answered}/${total} respondidas</span>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <span class="progress-label">${pct}%</span>
      </div>

      ${questionsHtml}

      <div class="case-nav">
        ${prevBtn}
        ${nextBtn}
      </div>
    </div>`;
}

function answer(caseId, qIdx, optIdx) {
  if (state.answers[caseId][qIdx] !== null) return;
  state.answers[caseId][qIdx] = optIdx;
  updateHeader();
  showCase(caseId);
  setTimeout(() => {
    const el = document.getElementById(`qcard-${caseId}-${qIdx}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 80);
}

function showResults() {
  state.current = 'results';
  renderSidebar();
  const total = totalQuestions();
  const correct = totalCorrect();
  const answered = totalAnswered();
  const pct = Math.round(correct / total * 100);

  const bySpec = [
    { label: 'Falla cardiaca · SCA', ids: [0,1,2], key: 'cardio' },
    { label: 'Metabólico', ids: [3,4,5], key: 'meta' },
    { label: 'Neumología', ids: [6,7], key: 'neumo' },
    { label: 'Neurología', ids: [8], key: 'neuro' },
    { label: 'Dermatología', ids: [9], key: 'derm' }
  ].map(g => {
    const gTotal = g.ids.reduce((s, id) => s + caseTotal(id), 0);
    const gAns = g.ids.reduce((s, id) => s + state.answers[id].filter(x => x !== null).length, 0);
    const gCorrect = g.ids.reduce((s, ci) =>
      s + state.answers[ci].filter((ans, qi) => ans !== null && ans === CASES[ci].questions[qi].correct).length, 0);
    const col = SPECIALTY_COLORS[g.key];
    const gpct = gTotal > 0 && gAns > 0 ? Math.round(gCorrect / gAns * 100) : 0;
    return `<div style="display:flex; align-items:center; gap:12px; padding: 10px 0; border-bottom: 1px solid var(--border);">
      <span class="specialty-pill" style="background:${col.bg}; color:${col.color}; font-size:10px; padding: 2px 8px; min-width: 110px; justify-content: center;">${g.label}</span>
      <div style="flex:1;">
        <div style="height:6px; background: var(--border); border-radius:3px; overflow:hidden;">
          <div style="height:100%; width:${gpct}%; background: ${col.color}; border-radius:3px; transition: width 0.6s ease;"></div>
        </div>
      </div>
      <span style="font-size:13px; color: var(--muted); min-width: 80px; text-align:right; font-variant-numeric: tabular-nums;">${gCorrect}/${gAns} correctas</span>
    </div>`;
  }).join('');

  const grade = pct >= 90 ? '¡Excelente dominio!' : pct >= 75 ? 'Buen desempeño' : pct >= 60 ? 'Desempeño aceptable' : 'Repasa los temas con menor puntaje';

  document.getElementById('main-content').innerHTML = `
    <div style="max-width: 640px;">
      <div class="results-card">
        <div class="results-score-big">${pct}%</div>
        <div class="results-label">${grade}</div>
        <div class="results-grid">
          <div class="result-stat"><strong>${correct}</strong>Correctas</div>
          <div class="result-stat"><strong>${answered - correct}</strong>Incorrectas</div>
          <div class="result-stat"><strong>${total - answered}</strong>Sin responder</div>
        </div>
      </div>

      <div style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;">
        <div style="font-size: 13px; font-weight: 600; margin-bottom: 1rem; color: var(--text);">Desempeño por especialidad</div>
        ${bySpec}
      </div>

      <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button class="btn btn-primary" onclick="showCase(0)">Reiniciar desde el caso 1</button>
        <button class="btn" onclick="showWelcome()">← Volver al inicio</button>
      </div>
    </div>`;
}

// Init
updateHeader();
showWelcome();
</script>
</body>
</html>
